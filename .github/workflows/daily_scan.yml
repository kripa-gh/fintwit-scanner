name: FinTwit Daily Scanner v5
# SCHEDULING: GitHub's `schedule` trigger is NOT used — measured behavior on
# this repo (Jun-Jul 2026): first 7-9h event drift, then only ~4-5 of ~96
# daily 15-min events delivered, at random hours. Both the plain-cron and the
# poll-and-gate designs failed on it. workflow_dispatch, by contrast, started
# within seconds on every recorded occasion — so an external clock (see
# docs/SCHEDULING.md) POSTs to the dispatch API at 03:00 and 10:31 UTC.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: main or premarket"
        default: "main"
      lookback_hours:
        description: "Tweet lookback (hours)"
        default: "48"
      min_mentions:
        description: "Min mentions"
        default: "1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Guard: if two dispatches overlap, queue the second instead of racing
    concurrency:
      group: fintwit-scan
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run scanner
        env:
          # Twitter
          TWITTER_LIST_ID:      ${{ secrets.TWITTER_LIST_ID }}
          TWITTER_AUTH_TOKEN:   ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0:          ${{ secrets.TWITTER_CT0 }}
          TWEET_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '48' }}
          MAX_TWEETS:           "1000"
          MIN_MENTIONS:         ${{ github.event.inputs.min_mentions || '1' }}
          # Telegram
          TELEGRAM_API_ID:      ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:    ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          # AI
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          # Email
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT:     ${{ secrets.REPORT_RECIPIENT }}
          # Trading config
          ACCOUNT_SIZE:         ${{ secrets.ACCOUNT_SIZE }}
          RISK_PER_TRADE_PCT:   ${{ secrets.RISK_PER_TRADE_PCT }}
          TRADE_JOURNAL_SHEET_ID: ${{ secrets.TRADE_JOURNAL_SHEET_ID }}
          # Mode from the dispatch input — the external clock sets it
          PREMARKET_MODE:       ${{ github.event.inputs.mode == 'premarket' && '1' || '0' }}
          SEND_RUN_SUMMARY:     "0"
        run: python main.py
      - name: Commit data files
        if: always()
        run: |
          git config user.name  "FinTwit Bot"
          git config user.email "bot@github-actions"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: scan data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main || true
          git push || true
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
