name: FinTwit Daily Stock Scanner v4

on:
  schedule:
    - cron: "30 10 * * 1-5"   # 4:00 PM IST = 10:30 UTC Mon–Fri
    - cron: "30 3 * * 1-5"    # 9:00 AM IST = 03:30 UTC (pre-market brief)
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Tweet lookback (hours)"
        default: "48"
      min_mentions:
        description: "Min mentions"
        default: "1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TWITTER_LIST_ID:      ${{ secrets.TWITTER_LIST_ID }}
          TWITTER_AUTH_TOKEN:   ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0:          ${{ secrets.TWITTER_CT0 }}
          TWEET_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '48' }}
          MAX_TWEETS:           "1000"
          MIN_MENTIONS:         ${{ github.event.inputs.min_mentions || '1' }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT:     ${{ secrets.REPORT_RECIPIENT }}
          SEND_RUN_SUMMARY:     "0"
        run: python main.py

      - name: Commit data files
        if: always()
        run: |
          git config user.name  "FinTwit Bot"
          git config user.email "bot@github-actions"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: update scan data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
