name: FinTwit Daily Scanner v5
on:
  schedule:
    # GitHub delays scheduled runs most at the top of the hour (:00), so these are
    # offset by a few minutes to land in a less-contended queue slot. This reduces
    # but does NOT eliminate delay — GitHub gives no on-time guarantee for free runners.
    - cron: "2 3 * * 1-5"    # ~8:32 AM IST (03:02 UTC) — Pre-market brief
    - cron: "37 10 * * 1-5"  # ~4:07 PM IST (10:37 UTC) — Main scan
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: main or premarket"
        default: "main"
      lookback_hours:
        description: "Tweet lookback (hours)"
        default: "48"
      min_mentions:
        description: "Min mentions"
        default: "1"
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run scanner
        env:
          # Twitter
          TWITTER_LIST_ID:      ${{ secrets.TWITTER_LIST_ID }}
          TWITTER_AUTH_TOKEN:   ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0:          ${{ secrets.TWITTER_CT0 }}
          TWEET_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '48' }}
          MAX_TWEETS:           "1000"
          MIN_MENTIONS:         ${{ github.event.inputs.min_mentions || '1' }}
          # Telegram
          TELEGRAM_API_ID:      ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:    ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          # AI
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          # Email
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT:     ${{ secrets.REPORT_RECIPIENT }}
          # Trading config
          ACCOUNT_SIZE:         ${{ secrets.ACCOUNT_SIZE }}
          RISK_PER_TRADE_PCT:   ${{ secrets.RISK_PER_TRADE_PCT }}
          TRADE_JOURNAL_SHEET_ID: ${{ secrets.TRADE_JOURNAL_SHEET_ID }}
          # Mode
          PREMARKET_MODE:       ${{ github.event.inputs.mode == 'premarket' && '1' || (github.event.schedule == '2 3 * * 1-5' && '1' || '0') }}
          SEND_RUN_SUMMARY:     "0"
        run: python main.py
      - name: Commit data files
        if: always()
        run: |
          git config user.name  "FinTwit Bot"
          git config user.email "bot@github-actions"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: scan data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || true
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
